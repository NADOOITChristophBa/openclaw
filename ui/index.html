<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Control</title>
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      (function () {
        var THEMES = { claw: 1, knot: 1, dash: 1 };
        var MODES = { system: 1, light: 1, dark: 1 };
        var LEGACY = {
          dark: "claw:dark",
          light: "claw:light",
          openknot: "knot:dark",
          fieldmanual: "dash:dark",
          clawdash: "dash:light",
          system: "claw:system",
        };
        try {
          var keys = Object.keys(localStorage);
          var raw;
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf("openclaw.control.settings.v1") === 0) {
              raw = localStorage.getItem(keys[i]);
              if (raw) break;
            }
          }
          if (!raw) return;
          var s = JSON.parse(raw);
          var t = s && s.theme;
          var m = s && s.themeMode;
          if (typeof t !== "string") t = "";
          if (typeof m !== "string") m = "";
          var legacy = LEGACY[t];
          var theme = THEMES[t] ? t : legacy ? legacy.split(":")[0] : "claw";
          var mode = MODES[m] ? m : legacy ? legacy.split(":")[1] : "system";
          if (mode === "system") {
            mode = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          var resolved =
            theme === "knot"
              ? mode === "light"
                ? "openknot-light"
                : "openknot"
              : theme === "dash"
                ? mode === "light"
                  ? "dash-light"
                  : "dash"
                : mode === "light"
                  ? "light"
                  : "dark";
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.setAttribute(
            "data-theme-mode",
            resolved.indexOf("light") !== -1 ? "light" : "dark",
          );
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <openclaw-app></openclaw-app>
    <script type="module" src="/src/main.ts"></script>
  <script>
// Cohere STT Override - Live Patch
(function() {
  const STT_SERVER = "http://localhost:8890";
  const STT_KEY = "local";
  
  let mediaRecorder = null;
  let audioChunks = [];
  
  window.isSttSupported = function() {
    return typeof MediaRecorder !== "undefined" && MediaRecorder.isTypeSupported("audio/webm");
  };
  
  window.startStt = function(callbacks) {
    console.log("[Cohere STT] Starting...");
    if (!isSttSupported()) {
      callbacks.onError?.("Not supported");
      return false;
    }
    
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(stream => {
        const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") 
          ? "audio/webm;codecs=opus" : "audio/webm";
        
        mediaRecorder = new MediaRecorder(stream, { mimeType });
        audioChunks = [];
        
        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        
        mediaRecorder.onstop = async () => {
          console.log("[Cohere STT] Sending to server...");
          const blob = new Blob(audioChunks, { type: mimeType });
          const formData = new FormData();
          formData.append("file", blob, "audio.webm");
          formData.append("model", "cohere-transcribe");
          formData.append("language", "de");
          
          try {
            const resp = await fetch(STT_SERVER + "/v1/audio/transcriptions", {
              method: "POST",
              headers: { "Authorization": "Bearer " + STT_KEY },
              body: formData
            });
            const result = await resp.json();
            console.log("[Cohere STT] Result:", result);
            callbacks.onTranscript?.(result.text || "", true);
          } catch(e) {
            console.error("[Cohere STT] Error:", e);
            callbacks.onError?.("Transcription failed: " + e);
          } finally {
            stream.getTracks().forEach(t => t.stop());
            audioChunks = [];
          }
        };
        
        mediaRecorder.start(1000);
        callbacks.onStart?.();
      })
      .catch(e => {
        console.error("[Cohere STT] Mic error:", e);
        callbacks.onError?.(e.message);
      });
    
    return true;
  };
  
  window.stopStt = function() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
      mediaRecorder.stop();
    }
    mediaRecorder = null;
  };
  
  console.log("[Cohere STT] Patched successfully!");
})();
</script>
